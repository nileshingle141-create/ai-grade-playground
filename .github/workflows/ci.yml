name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Route smoke test (static)
        run: bun run check:routes

      - name: Lint
        run: bun run lint

      - name: Build
        env:
          VITE_SUPABASE_PROJECT_ID: supabase
          VITE_SUPABASE_URL: https://supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: mockkey
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          bun run preview --port 8080 --host 127.0.0.1 > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then
              echo "preview ready"; exit 0
            fi
            sleep 1
          done
          echo "preview did not start"; cat /tmp/preview.log; exit 1

      - name: Runtime smoke (auth redirect + invalid-ID fallback)
        env:
          SMOKE_BASE_URL: http://127.0.0.1:8080
          VITE_SUPABASE_PROJECT_ID: supabase
          VITE_SUPABASE_URL: https://supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: mockkey
        run: bun run check:runtime

      - name: Stop preview server
        if: always()
        run: kill $(cat /tmp/preview.pid) || true

      - name: Upload route report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-report
          path: route-report/
          if-no-files-found: warn
