name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Route smoke test
        run: bun run check:routes

      - name: Upload route report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-report
          path: route-report/
          if-no-files-found: warn

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
